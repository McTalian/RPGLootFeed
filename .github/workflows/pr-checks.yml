name: PR Checks

on:
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

permissions: {}

jobs:
  pr-checks:
    uses: McTalian-WoW-Addons/wow-build-tools/.github/workflows/pr-checks.yml@v1-beta
    with:
      addon-name: RPGLootFeed
      rockspec-name: rpglootfeed-1-1.rockspec
      lua-version: 5.3.5
      i18n-enabled: true
      trunk-enabled: true
    secrets: inherit
